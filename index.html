<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Otávio · BetTracker Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c518">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BetTracker">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #191c23;
    --border: #1f2330;
    --accent: #f5c518;
    --accent2: #00e5a0;
    --red: #ff4757;
    --green: #00e5a0;
    --blue: #4a9eff;
    --purple: #9b6dff;
    --text: #e8eaf0;
    --muted: #5a6070;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size: 14px; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; overflow-x: hidden; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top:0; z-index:100; }
  .logo { font-family: var(--font-head); font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-date { color: var(--muted); font-size: 0.78rem; }
  .nav { display: flex; gap: 2px; padding: 12px 28px 0; border-bottom: 1px solid var(--border); background: var(--surface); }
  .nav-tab { padding: 10px 20px; border: none; background: transparent; color: var(--muted); font-family: var(--font-head); font-size: 0.85rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 0.5px; text-transform: uppercase; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab:hover:not(.active) { color: var(--text); }
  .page { display: none; padding: 24px 28px; }
  .page.active { display: block; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .stat-card.yellow::before { background: var(--accent); }
  .stat-card.green::before { background: var(--green); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.blue::before { background: var(--blue); }
  .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-value { font-family: var(--font-head); font-size: 1.7rem; font-weight: 800; }
  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }
  .stat-sub { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }
  .form-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .section-title { font-family: var(--font-head); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
  .form-group input, .form-group select, .form-group textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--font-mono); font-size: 0.85rem; padding: 9px 12px; outline: none; transition: border-color 0.2s; width: 100%; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }
  .btn { padding: 10px 22px; border: none; border-radius: 8px; font-family: var(--font-head); font-size: 0.82rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #ffda3a; transform: translateY(-1px); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 0.7rem; }
  .bets-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; border-bottom: 1px solid var(--border); }
  td { padding: 11px 14px; border-bottom: 1px solid #161820; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .pos-val { color: var(--green); font-weight: 600; }
  .neg-val { color: var(--red); font-weight: 600; }
  .insights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
  .insight-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .insight-title { font-family: var(--font-head); font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.75rem; }
  .bar-label { width: 90px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
  .bar-val { width: 55px; text-align: right; color: var(--text); }
  .opp-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .opp-title { font-family: var(--font-head); font-size: 1.3rem; font-weight: 800; }
  .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); font-family: var(--font-mono); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(245,197,24,0.08); }
  .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
  .sport-tabs { display: inline-flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
  .sport-tab { padding: 8px 20px; border: none; background: transparent; color: var(--muted); font-family: var(--font-head); font-size: 0.82rem; font-weight: 700; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
  .sport-tab.active { background: var(--accent); color: #000; }
  .matches-grid { display: grid; gap: 10px; }
  .match-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
  .match-card:hover { border-color: rgba(245,197,24,0.3); transform: translateX(2px); }
  .match-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .match-league { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .match-time { font-size: 0.72rem; color: var(--accent); font-weight: 600; }
  .match-teams { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
  .match-teams .vs { color: var(--muted); font-size: 0.75rem; margin: 0 8px; font-weight: 400; font-family: var(--font-mono); }
  .odds-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .odd-chip { display: flex; flex-direction: column; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; min-width: 75px; transition: all 0.2s; cursor: pointer; }
  .odd-chip:hover { border-color: var(--accent); background: rgba(245,197,24,0.07); }
  .odd-chip.highlight { border-color: var(--accent2); background: rgba(0,229,160,0.07); }
  .odd-type { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
  .odd-val { font-family: var(--font-head); font-size: 1rem; font-weight: 800; color: var(--text); }
  .odd-chip.highlight .odd-val { color: var(--accent2); }
  .value-tag { font-size: 0.6rem; color: var(--accent2); font-weight: 600; margin-top: 2px; }
  .loading-spinner { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); flex-direction: column; gap: 14px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .last-update { font-size: 0.7rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot-live { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 0.82rem; }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 18px; font-size: 0.82rem; z-index: 999; transform: translateY(20px); opacity: 0; transition: all 0.3s; pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .insights-grid { grid-template-columns: 1fr; }
    .page { padding: 14px; }
    .nav { padding: 10px 14px 0; overflow-x: auto; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="logo">Otávio <span>·</span> BetTracker</div>
  <div class="header-date" id="headerDate">—</div>
</div>
<div class="nav">
  <button class="nav-tab active" onclick="showPage('registro')">📋 Registro</button>
  <button class="nav-tab" onclick="showPage('insights')">📊 Insights</button>
  <button class="nav-tab" onclick="showPage('oportunidades')">🎯 Oportunidades</button>
</div>
<div class="page active" id="page-registro">
  <div class="stats-grid">
    <div class="stat-card yellow"><div class="stat-label">Total Apostado</div><div class="stat-value" id="stat-total">R$ 0</div><div class="stat-sub" id="stat-count">0 apostas</div></div>
    <div class="stat-card green"><div class="stat-label">Lucro / Perda</div><div class="stat-value" id="stat-pnl">R$ 0</div><div class="stat-sub" id="stat-roi">ROI: 0%</div></div>
    <div class="stat-card blue"><div class="stat-label">Taxa de Acerto</div><div class="stat-value" id="stat-winrate">0%</div><div class="stat-sub" id="stat-wl">0W / 0L</div></div>
    <div class="stat-card red"><div class="stat-label">Odd Média</div><div class="stat-value" id="stat-avgodds">0.00</div><div class="stat-sub">odd média ponderada</div></div>
  </div>
  <div class="form-section">
    <div class="section-title">➕ Nova Aposta</div>
    <div class="form-grid">
      <div class="form-group"><label>Data</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>Evento</label><input type="text" id="f-event" placeholder="Ex: Flamengo x Palmeiras"></div>
      <div class="form-group">
        <label>Tipo de Mercado</label>
        <select id="f-market">
          <option value="">Selecionar...</option>
          <optgroup label="⚽ Futebol">
            <option>Resultado Final (1X2)</option><option>Ambos Marcam</option><option>Over/Under 2.5</option>
            <option>Over/Under 1.5</option><option>Handicap Asiático</option><option>Placar Exato</option>
            <option>Primeiro Gol</option><option>Dupla Chance</option><option>BTTS + Over 2.5</option><option>Gols por tempo</option>
          </optgroup>
          <optgroup label="🎾 Tênis">
            <option>Vencedor do Jogo</option><option>Handicap Sets</option><option>Over/Under Games</option>
            <option>Set Correto</option><option>Total de Sets</option><option>Vencedor 1º Set</option>
          </optgroup>
          <optgroup label="🏀 Basquete">
            <option>Resultado (ML)</option><option>Over/Under Pontos</option><option>Handicap</option>
          </optgroup>
          <optgroup label="Outros"><option>Outro</option></optgroup>
        </select>
      </div>
      <div class="form-group"><label>Seleção</label><input type="text" id="f-selection" placeholder="Ex: Flamengo vence"></div>
      <div class="form-group"><label>Odd</label><input type="number" id="f-odds" step="0.01" min="1" placeholder="1.85"></div>
      <div class="form-group"><label>Valor (R$)</label><input type="number" id="f-stake" step="0.01" min="0" placeholder="50.00"></div>
      <div class="form-group">
        <label>Resultado</label>
        <select id="f-result">
          <option value="pending">Pendente</option><option value="win">✅ Ganhou</option>
          <option value="loss">❌ Perdeu</option><option value="void">⬜ Void/Devolvida</option><option value="cashout">💸 Cashout</option>
        </select>
      </div>
      <div class="form-group"><label>Lucro/Perda Real (R$)</label><input type="number" id="f-pnl" step="0.01" placeholder="Auto-calculado"></div>
      <div class="form-group">
        <label>Esporte</label>
        <select id="f-sport">
          <option value="⚽ Futebol">⚽ Futebol</option><option value="🎾 Tênis">🎾 Tênis</option>
          <option value="🏀 Basquete">🏀 Basquete</option><option value="🎰 Outro">🎰 Outro</option>
        </select>
      </div>
      <div class="form-group"><label>Notas</label><input type="text" id="f-notes" placeholder="Observações..."></div>
    </div>
    <div style="margin-top:14px; display:flex; gap:10px; align-items:center;">
      <button class="btn btn-primary" onclick="addBet()">Registrar Aposta</button>
      <span id="form-msg" style="font-size:0.75rem; color:var(--green);"></span>
    </div>
  </div>
  <div class="bets-table-wrap">
    <div class="table-header">
      <div class="section-title" style="margin:0">📋 Apostas Registradas</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="text" id="search-bets" onkeyup="renderTable()" placeholder="Buscar..." style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-mono);font-size:0.75rem;padding:6px 10px;outline:none;width:160px;">
        <select id="filter-sport" onchange="renderTable()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-mono);font-size:0.75rem;padding:6px 10px;outline:none;">
          <option value="">Todos esportes</option><option>⚽ Futebol</option><option>🎾 Tênis</option><option>🏀 Basquete</option>
        </select>
        <select id="filter-result" onchange="renderTable()" style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font-mono);font-size:0.75rem;padding:6px 10px;outline:none;">
          <option value="">Todos resultados</option><option value="win">Ganhou</option><option value="loss">Perdeu</option><option value="pending">Pendente</option>
        </select>
      </div>
    </div>
    <div id="bets-table-body"><div class="empty-state"><div class="empty-icon">📭</div>Nenhuma aposta registrada ainda.</div></div>
  </div>
</div>
<div class="page" id="page-insights">
  <div class="insights-grid" id="insights-container"></div>
  <div id="insights-details"></div>
</div>
<div class="page" id="page-oportunidades">
  <div class="opp-header">
    <div>
      <div class="opp-title">🎯 Oportunidades do Dia</div>
      <div class="last-update"><div class="dot-live"></div><span id="last-update-txt">Atualizando...</span></div>
    </div>
    <button class="btn btn-primary" onclick="loadOpportunities()">🔄 Atualizar</button>
  </div>
  <div class="filters" id="day-filters"></div>
  <div class="sport-tabs">
    <button class="sport-tab active" id="tab-football" onclick="switchSport('football')">⚽ Futebol</button>
    <button class="sport-tab" id="tab-tennis" onclick="switchSport('tennis')">🎾 Tênis</button>
  </div>
  <div id="opp-content"><div class="loading-spinner"><div class="spinner"></div><span>Buscando oportunidades...</span></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY = 'otavio_bets_v2';
let bets = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentSport = 'football';
let currentDayFilter = 0;
let opportunities = { football: [], tennis: [] };

document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  document.getElementById('f-date').value = today.toISOString().split('T')[0];
  document.getElementById('headerDate').textContent = today.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
  document.getElementById('f-result').addEventListener('change', calcPnl);
  document.getElementById('f-odds').addEventListener('input', calcPnl);
  document.getElementById('f-stake').addEventListener('input', calcPnl);
  buildDayFilters();
  renderStats();
  renderTable();
  loadOpportunities();
});

function calcPnl() {
  const result = document.getElementById('f-result').value;
  const odds = parseFloat(document.getElementById('f-odds').value) || 0;
  const stake = parseFloat(document.getElementById('f-stake').value) || 0;
  let pnl = '';
  if (result === 'win') pnl = ((odds - 1) * stake).toFixed(2);
  else if (result === 'loss') pnl = (-stake).toFixed(2);
  else if (result === 'void') pnl = '0';
  document.getElementById('f-pnl').value = pnl;
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  event.target.classList.add('active');
  if (p === 'insights') renderInsights();
  if (p === 'oportunidades') buildDayFilters();
}

function addBet() {
  const date = document.getElementById('f-date').value;
  const ev = document.getElementById('f-event').value.trim();
  const market = document.getElementById('f-market').value;
  const selection = document.getElementById('f-selection').value.trim();
  const odds = parseFloat(document.getElementById('f-odds').value);
  const stake = parseFloat(document.getElementById('f-stake').value);
  const result = document.getElementById('f-result').value;
  const pnl = parseFloat(document.getElementById('f-pnl').value) || 0;
  const sport = document.getElementById('f-sport').value;
  const notes = document.getElementById('f-notes').value.trim();
  if (!ev || !odds || !stake) { showToast('⚠️ Preencha: Evento, Odd e Valor', true); return; }
  bets.unshift({ id: Date.now(), date, event: ev, market, selection, odds, stake, result, pnl, sport, notes });
  save(); renderStats(); renderTable();
  showToast('✅ Aposta registrada!');
  ['f-event','f-selection','f-odds','f-stake','f-pnl','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-result').value = 'pending';
}

function deleteBet(id) {
  if (!confirm('Remover esta aposta?')) return;
  bets = bets.filter(b => b.id !== id);
  save(); renderStats(); renderTable();
  showToast('🗑️ Aposta removida');
}

function updateResult(id, result) {
  const b = bets.find(b => b.id === id);
  if (!b) return;
  b.result = result;
  if (result === 'win') b.pnl = +((b.odds - 1) * b.stake).toFixed(2);
  else if (result === 'loss') b.pnl = -b.stake;
  else if (result === 'void') b.pnl = 0;
  save(); renderStats(); renderTable();
  showToast('📝 Resultado atualizado');
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bets)); }

function renderStats() {
  const resolved = bets.filter(b => b.result !== 'pending' && b.result !== 'void');
  const total = bets.reduce((s, b) => s + b.stake, 0);
  const pnl = bets.reduce((s, b) => s + (b.pnl || 0), 0);
  const wins = resolved.filter(b => b.result === 'win').length;
  const losses = resolved.filter(b => b.result === 'loss').length;
  const roi = total > 0 ? (pnl / total * 100) : 0;
  const avgOdds = bets.length > 0 ? (bets.reduce((s,b) => s + b.odds, 0) / bets.length) : 0;
  document.getElementById('stat-total').textContent = 'R$ ' + total.toFixed(2);
  document.getElementById('stat-count').textContent = bets.length + ' apostas';
  const pnlEl = document.getElementById('stat-pnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + 'R$ ' + pnl.toFixed(2);
  pnlEl.className = 'stat-value ' + (pnl >= 0 ? 'pos' : 'neg');
  document.getElementById('stat-roi').textContent = 'ROI: ' + (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
  const wr = resolved.length > 0 ? (wins / resolved.length * 100) : 0;
  document.getElementById('stat-winrate').textContent = wr.toFixed(0) + '%';
  document.getElementById('stat-wl').textContent = wins + 'W / ' + losses + 'L';
  document.getElementById('stat-avgodds').textContent = avgOdds.toFixed(2);
}

function renderTable() {
  const search = document.getElementById('search-bets').value.toLowerCase();
  const fSport = document.getElementById('filter-sport').value;
  const fResult = document.getElementById('filter-result').value;
  let filtered = bets.filter(b => {
    const ms = !search || b.event.toLowerCase().includes(search) || (b.market||'').toLowerCase().includes(search) || (b.selection||'').toLowerCase().includes(search);
    return ms && (!fSport || b.sport === fSport) && (!fResult || b.result === fResult);
  });
  const wrap = document.getElementById('bets-table-body');
  if (!filtered.length) { wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>Nenhuma aposta encontrada.</div>'; return; }
  const labelMap = { win:'✅ Ganhou', loss:'❌ Perdeu', pending:'⏳ Pendente', void:'⬜ Void', cashout:'💸 Cashout' };
  wrap.innerHTML = `<table><thead><tr><th>Data</th><th>Evento</th><th>Mercado</th><th>Seleção</th><th>Odd</th><th>Valor</th><th>Resultado</th><th>L/P</th><th>Ações</th></tr></thead><tbody>
    ${filtered.map(b => `<tr>
      <td>${formatDate(b.date)}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${b.sport} ${b.event}</td>
      <td style="color:var(--muted);font-size:0.75rem;">${b.market||'—'}</td>
      <td style="font-size:0.78rem;">${b.selection||'—'}</td>
      <td><strong>${(b.odds||0).toFixed(2)}</strong></td>
      <td>R$ ${(b.stake||0).toFixed(2)}</td>
      <td><select onchange="updateResult(${b.id}, this.value)" style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-mono);font-size:0.72rem;padding:4px 6px;outline:none;">
        ${['pending','win','loss','void','cashout'].map(r=>`<option value="${r}" ${b.result===r?'selected':''}>${labelMap[r]}</option>`).join('')}
      </select></td>
      <td class="${(b.pnl||0)>=0?'pos-val':'neg-val'}">${(b.pnl||0)>=0?'+':''}R$ ${(b.pnl||0).toFixed(2)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteBet(${b.id})">✕</button></td>
    </tr>`).join('')}
  </tbody></table>`;
}

function formatDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}`;
}

function renderInsights() {
  const c = document.getElementById('insights-container');
  if (!bets.length) { c.innerHTML = '<div class="empty-state" style="grid-column:span 3"><div class="empty-icon">📊</div>Registre apostas para ver insights.</div>'; document.getElementById('insights-details').innerHTML=''; return; }
  const sports={}, markets={};
  const days=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const byDay=Array(7).fill(null).map(()=>({count:0,won:0,pnl:0}));
  bets.forEach(b => {
    if(!sports[b.sport]) sports[b.sport]={count:0,won:0,stake:0,pnl:0};
    sports[b.sport].count++; sports[b.sport].stake+=b.stake; sports[b.sport].pnl+=(b.pnl||0);
    if(b.result==='win') sports[b.sport].won++;
    if(b.market){
      if(!markets[b.market]) markets[b.market]={count:0,won:0,pnl:0,stake:0};
      markets[b.market].count++; markets[b.market].stake+=b.stake; markets[b.market].pnl+=(b.pnl||0);
      if(b.result==='win') markets[b.market].won++;
    }
    if(b.date){ const d=new Date(b.date).getDay(); byDay[d].count++; byDay[d].pnl+=(b.pnl||0); if(b.result==='win') byDay[d].won++; }
  });
  const mxS=Math.max(...Object.values(sports).map(s=>Math.abs(s.pnl)),1);
  const mxM=Math.max(...Object.values(markets).map(m=>Math.abs(m.pnl)),1);
  c.innerHTML=`
    <div class="insight-card"><div class="insight-title">📈 Performance por Esporte</div>
      ${Object.entries(sports).map(([sp,s])=>{const roi=s.stake>0?(s.pnl/s.stake*100):0;const pos=s.pnl>=0;const pct=Math.abs(s.pnl)/mxS*100;
        return `<div class="bar-row"><div class="bar-label">${sp}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pos?'var(--green)':'var(--red)'}"></div></div><div class="bar-val" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}R$${s.pnl.toFixed(0)}</div></div>
        <div style="font-size:0.7rem;color:var(--muted);margin-bottom:10px;">${s.count} apostas · ${s.count>0?(s.won/s.count*100).toFixed(0):0}% acerto · ROI ${roi.toFixed(1)}%</div>`;}).join('')}
    </div>
    <div class="insight-card"><div class="insight-title">🎯 Melhores Mercados</div>
      ${Object.entries(markets).sort((a,b)=>b[1].pnl-a[1].pnl).slice(0,6).map(([mkt,m])=>{const pos=m.pnl>=0;const pct=Math.abs(m.pnl)/mxM*100;
        return `<div class="bar-row"><div class="bar-label" title="${mkt}">${mkt}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pos?'var(--green)':'var(--red)'}"></div></div><div class="bar-val" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}R$${m.pnl.toFixed(0)}</div></div>`;}).join('')}
    </div>
    <div class="insight-card"><div class="insight-title">📅 P&L por Dia da Semana</div>
      ${byDay.map((d,i)=>{if(!d.count) return '';const pos=d.pnl>=0;const mx=Math.max(...byDay.map(x=>Math.abs(x.pnl)),1);const pct=Math.abs(d.pnl)/mx*100;
        return `<div class="bar-row"><div class="bar-label">${days[i]}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pos?'var(--green)':'var(--red)'}"></div></div><div class="bar-val" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}R$${d.pnl.toFixed(0)}</div></div>`;}).join('')}
    </div>`;
  const totalStake=bets.reduce((s,b)=>s+b.stake,0);
  const totalPnl=bets.reduce((s,b)=>s+(b.pnl||0),0);
  const resolved=bets.filter(b=>b.result!=='pending'&&b.result!=='void');
  const bestBet=[...bets].sort((a,b)=>(b.pnl||0)-(a.pnl||0))[0];
  const worstBet=[...bets].sort((a,b)=>(a.pnl||0)-(b.pnl||0))[0];
  document.getElementById('insights-details').innerHTML=`<div class="form-section"><div class="section-title">💡 Resumo Geral</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;font-size:0.82rem;">
      <div><span style="color:var(--muted)">Total investido:</span> <strong>R$ ${totalStake.toFixed(2)}</strong></div>
      <div><span style="color:var(--muted)">P&L total:</span> <strong style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">${totalPnl>=0?'+':''}R$ ${totalPnl.toFixed(2)}</strong></div>
      <div><span style="color:var(--muted)">ROI geral:</span> <strong>${totalStake>0?(totalPnl/totalStake*100).toFixed(2):0}%</strong></div>
      <div><span style="color:var(--muted)">Apostas resolvidas:</span> <strong>${resolved.length}</strong></div>
      <div><span style="color:var(--muted)">Sequência atual:</span> <strong>${calcStreak()}</strong></div>
      ${bestBet?`<div><span style="color:var(--muted)">Melhor aposta:</span> <strong style="color:var(--green)">${bestBet.event} (+R$${(bestBet.pnl||0).toFixed(2)})</strong></div>`:''}
      ${worstBet?`<div><span style="color:var(--muted)">Pior aposta:</span> <strong style="color:var(--red)">${worstBet.event} (R$${(worstBet.pnl||0).toFixed(2)})</strong></div>`:''}
    </div></div>`;
}

function calcStreak() {
  const res=bets.filter(b=>b.result==='win'||b.result==='loss').map(b=>b.result);
  if(!res.length) return '—';
  const last=res[0]; let streak=1;
  for(let i=1;i<res.length;i++){if(res[i]===last)streak++;else break;}
  return `${streak}x ${last==='win'?'✅ vitórias':'❌ derrotas'} seguidas`;
}

function buildDayFilters() {
  const wrap=document.getElementById('day-filters');
  const labels=['Hoje','Amanhã','+2 dias','+3 dias','+4 dias'];
  wrap.innerHTML='<span style="font-size:0.72rem;color:var(--muted);margin-right:4px;">Filtrar:</span>'+
    labels.map((l,i)=>`<button class="filter-btn ${i===currentDayFilter?'active':''}" onclick="setDayFilter(${i})">${l}</button>`).join('');
}

function setDayFilter(n) { currentDayFilter=n; buildDayFilters(); renderOpportunities(); }

function switchSport(sport) {
  currentSport=sport;
  document.getElementById('tab-football').classList.toggle('active',sport==='football');
  document.getElementById('tab-tennis').classList.toggle('active',sport==='tennis');
  renderOpportunities();
}

async function loadOpportunities() {
  document.getElementById('opp-content').innerHTML='<div class="loading-spinner"><div class="spinner"></div><span>Buscando oportunidades via IA...</span></div>';
  const targetDate=new Date();
  targetDate.setDate(targetDate.getDate()+currentDayFilter);
  const dateStr=targetDate.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
  try {
    const [footRes,tennisRes]=await Promise.all([fetchMatches('futebol',dateStr),fetchMatches('tenis',dateStr)]);
    opportunities.football=footRes; opportunities.tennis=tennisRes;
    document.getElementById('last-update-txt').textContent='Atualizado: '+new Date().toLocaleTimeString('pt-BR');
    renderOpportunities();
  } catch(e) {
    document.getElementById('opp-content').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div>Erro ao carregar. Verifique sua conexão.</div>';
  }
}

async function fetchMatches(sport, dateStr) {
  const prompt=`Você é um analista de apostas esportivas profissional focado no mercado brasileiro.\nGere uma lista de JOGOS REALISTAS que acontecem ${dateStr} para ${sport}.\nUse ligas reais: ${sport==='futebol'?'Brasileirão Série A, Premier League, La Liga, Bundesliga, Libertadores, Champions League':'ATP 250/500/1000, WTA, Roland Garros, Wimbledon, US Open'}.\nPara cada jogo, forneça odds realistas de mercado (similares ao Bet365).\n\nResponda SOMENTE com JSON válido, sem texto extra, sem markdown, seguindo EXATAMENTE este formato:\n{\n  "matches": [\n    {\n      "id": "1",\n      "league": "nome da liga",\n      "leagueFlag": "🏆",\n      "home": "nome do time/jogador casa",\n      "away": "nome do time/jogador visitante",\n      "time": "HH:MM",\n      "odds": [\n        {"type": "Casa", "value": 1.85, "highlight": false},\n        {"type": "Empate", "value": 3.40, "highlight": false},\n        {"type": "Fora", "value": 4.20, "highlight": false},\n        {"type": "Over 2.5", "value": 1.72, "highlight": true},\n        {"type": "BTTS", "value": 1.65, "highlight": false}\n      ],\n      "tip": "breve dica de 1 linha para apostadores",\n      "confidence": 3\n    }\n  ]\n}\n\nGere exatamente 8 jogos variados com ligas diferentes. Para tênis, omita "Empate" e adicione "Handicap -4.5" e "Over Games". Confidence de 1 a 5. highlight=true para a odd com melhor valor.`;
  const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data=await response.json();
  const text=data.content.map(i=>i.text||'').join('');
  const clean=text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean).matches||[];
}

function renderOpportunities() {
  const matches=currentSport==='football'?opportunities.football:opportunities.tennis;
  const wrap=document.getElementById('opp-content');
  if(!matches||!matches.length){wrap.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div>Nenhuma oportunidade encontrada.</div>';return;}
  wrap.innerHTML=`<div class="matches-grid">${matches.map(m=>`
    <div class="match-card">
      <div class="match-top">
        <div class="match-league">${m.leagueFlag||'🏆'} ${m.league}</div>
        <div style="display:flex;align-items:center;gap:12px;"><div>${'⭐'.repeat(m.confidence||3)}</div><div class="match-time">🕐 ${m.time}</div></div>
      </div>
      <div class="match-teams">${m.home} <span class="vs">VS</span> ${m.away}</div>
      <div class="odds-row">${(m.odds||[]).map(o=>`
        <div class="odd-chip ${o.highlight?'highlight':''}" onclick="quickBet('${m.home} x ${m.away}','${o.type}',${o.value})">
          <div class="odd-type">${o.type}</div>
          <div class="odd-val">${(+o.value).toFixed(2)}</div>
          ${o.highlight?'<div class="value-tag">★ valor</div>':''}
        </div>`).join('')}
      </div>
      ${m.tip?`<div style="margin-top:10px;font-size:0.72rem;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;">💡 ${m.tip}</div>`:''}
    </div>`).join('')}</div>`;
}

function quickBet(ev,market,odds) {
  showPage_direct('registro');
  setTimeout(()=>{
    document.getElementById('f-event').value=ev;
    document.getElementById('f-market').value=market;
    document.getElementById('f-odds').value=odds;
    document.getElementById('f-event').focus();
    showToast(`📋 Aposta pré-preenchida: ${ev} @ ${odds}`);
  },100);
}

function showPage_direct(p) {
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab')[0].classList.add('active');
}

function showToast(msg,err) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.borderColor=err?'var(--red)':'var(--accent)';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}
setInterval(()=>{if(document.getElementById('page-oportunidades').classList.contains('active'))loadOpportunities();},4*60*60*1000);
</script>
</body>
</html>
