<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Otávio · BetTracker Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f5c518">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BetTracker">
<link rel="apple-touch-icon" href="IMG_8958.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<!-- Firebase SDK -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Substitua com suas credenciais do Firebase Console ──
  const firebaseConfig = {
    apiKey: "COLE_SUA_API_KEY_AQUI",
    authDomain: "COLE_SEU_AUTH_DOMAIN",
    projectId: "COLE_SEU_PROJECT_ID",
    storageBucket: "COLE_SEU_STORAGE_BUCKET",
    messagingSenderId: "COLE_SEU_MESSAGING_ID",
    appId: "COLE_SEU_APP_ID"
  };

  const cloudEnabled = firebaseConfig.apiKey !== "COLE_SUA_API_KEY_AQUI";
  let db = null;

  if (cloudEnabled) {
    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    } catch(e) { console.warn("Firebase init error:", e); }
  }

  window._fb = { db, cloudEnabled, setDoc, getDoc, onSnapshot, doc };
</script>

<style>
  :root {
    --bg:#0a0c0f; --surface:#111318; --surface2:#191c23; --border:#1f2330;
    --accent:#f5c518; --accent2:#00e5a0; --red:#ff4757; --green:#00e5a0;
    --blue:#4a9eff; --text:#e8eaf0; --muted:#5a6070;
    --font-head:'Syne',sans-serif; --font-mono:'DM Mono',monospace;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{font-size:14px}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden;padding-bottom:calc(64px + var(--safe-bot))}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + var(--safe-top)) 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .logo{font-family:var(--font-head);font-size:1.2rem;font-weight:800;display:flex;align-items:center;gap:8px}
  .logo img{width:30px;height:30px;border-radius:50%;object-fit:cover}
  .logo-accent{color:var(--accent)}
  .cloud-badge{font-size:0.62rem;padding:3px 9px;border-radius:20px;border:1px solid;display:flex;align-items:center;gap:5px;transition:all 0.3s}
  .cloud-badge.on{border-color:var(--green);color:var(--green)}
  .cloud-badge.off{border-color:var(--muted);color:var(--muted)}
  .sync-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
  .sync-dot.synced{background:var(--green)}
  .sync-dot.syncing{background:var(--accent);animation:pulse 0.8s infinite}
  .sync-dot.local{background:var(--muted)}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bot)}
  .bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 4px;border:none;background:transparent;color:var(--muted);font-family:var(--font-head);font-size:0.6rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:color 0.2s}
  .bnav-tab .icon{font-size:1.25rem;line-height:1}
  .bnav-tab.active{color:var(--accent)}

  /* PAGES */
  .page{display:none;padding:14px}
  .page.active{display:block}

  /* STAT CARDS */
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px;position:relative;overflow:hidden}
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .stat-card.yellow::before{background:var(--accent)}
  .stat-card.green::before{background:var(--green)}
  .stat-card.red::before{background:var(--red)}
  .stat-card.blue::before{background:var(--blue)}
  .stat-label{font-size:0.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
  .stat-value{font-family:var(--font-head);font-size:1.45rem;font-weight:800}
  .stat-value.pos{color:var(--green)}
  .stat-value.neg{color:var(--red)}
  .stat-sub{font-size:0.63rem;color:var(--muted);margin-top:2px}

  /* FORM */
  .form-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
  .section-title{font-family:var(--font-head);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:12px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .form-group{display:flex;flex-direction:column;gap:4px}
  .form-group.full{grid-column:span 2}
  .form-group label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px}
  .form-group input,.form-group select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:0.85rem;padding:10px 12px;outline:none;transition:border-color 0.2s;width:100%;-webkit-appearance:none}
  .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
  .form-group select option{background:var(--surface2)}
  .btn{padding:11px 18px;border:none;border-radius:10px;font-family:var(--font-head);font-size:0.8rem;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
  .btn-primary{background:var(--accent);color:#000;width:100%;margin-top:10px}
  .btn-primary:active{transform:scale(0.98);background:#e6b800}
  .btn-danger{background:var(--red);color:#fff}
  .btn-sm{padding:5px 10px;font-size:0.68rem}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}

  /* BETS LIST */
  .filters-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
  .filters-row::-webkit-scrollbar{display:none}
  .filter-pill{padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-size:0.7rem;cursor:pointer;white-space:nowrap;font-family:var(--font-mono);transition:all 0.2s;flex-shrink:0}
  .filter-pill.active{border-color:var(--accent);color:var(--accent);background:rgba(245,197,24,0.08)}
  .bets-list{display:flex;flex-direction:column;gap:8px}
  .bet-row{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 13px}
  .bet-row-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .bet-event{font-family:var(--font-head);font-size:0.85rem;font-weight:700;flex:1;margin-right:8px;line-height:1.3}
  .bet-pnl{font-family:var(--font-head);font-size:0.9rem;font-weight:800;white-space:nowrap}
  .bet-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
  .tag{font-size:0.63rem;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .tag.gold{border-color:rgba(245,197,24,0.3);color:var(--accent);background:rgba(245,197,24,0.07)}
  .bet-row-bot{display:flex;gap:6px;align-items:center}
  .result-select{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-mono);font-size:0.72rem;padding:7px 9px;outline:none;-webkit-appearance:none}

  /* INSIGHTS */
  .insight-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:11px}
  .insight-title{font-family:var(--font-head);font-size:0.73rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:11px}
  .bar-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:0.72rem}
  .bar-label{width:88px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
  .bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.7s ease}
  .bar-val{width:58px;text-align:right;font-weight:600;flex-shrink:0}

  /* OPORTUNIDADES */
  .opp-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
  .opp-title{font-family:var(--font-head);font-size:1.1rem;font-weight:800}
  .last-update{font-size:0.63rem;color:var(--muted);display:flex;align-items:center;gap:4px;margin-top:3px}
  .dot-live{width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .day-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
  .day-filters::-webkit-scrollbar{display:none}
  .filter-btn{padding:6px 13px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:var(--font-mono);font-size:0.7rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
  .filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(245,197,24,0.08)}
  .sport-tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:12px}
  .sport-tab{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);font-family:var(--font-head);font-size:0.78rem;font-weight:700;cursor:pointer;border-radius:8px;transition:all 0.2s;text-align:center}
  .sport-tab.active{background:var(--accent);color:#000}

  /* AI BANNER */
  .ai-banner{background:linear-gradient(135deg,rgba(245,197,24,0.07),rgba(0,229,160,0.05));border:1px solid rgba(245,197,24,0.18);border-radius:12px;padding:13px;margin-bottom:12px}
  .ai-banner-title{font-family:var(--font-head);font-size:0.72rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
  .ai-banner-text{font-size:0.77rem;color:var(--text);line-height:1.5}
  .ai-banner-text strong{color:var(--accent2)}

  /* MATCH CARDS */
  .match-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px;transition:border-color 0.2s}
  .match-card.recommended{border-color:rgba(0,229,160,0.28)}
  .match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .match-league{font-size:0.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .match-time{font-size:0.68rem;color:var(--accent);font-weight:600}
  .match-teams{font-family:var(--font-head);font-size:0.95rem;font-weight:700;margin-bottom:9px;line-height:1.3}
  .match-teams .vs{color:var(--muted);font-size:0.68rem;margin:0 5px;font-family:var(--font-mono);font-weight:400}
  .odds-row{display:flex;gap:5px;flex-wrap:wrap}
  .odd-chip{display:flex;flex-direction:column;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;min-width:64px;cursor:pointer;transition:all 0.15s}
  .odd-chip:active{transform:scale(0.95)}
  .odd-chip.highlight{border-color:var(--accent2);background:rgba(0,229,160,0.07)}
  .odd-chip.best-market{border-color:var(--accent);background:rgba(245,197,24,0.07)}
  .odd-type{font-size:0.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
  .odd-val{font-family:var(--font-head);font-size:0.95rem;font-weight:800}
  .odd-chip.highlight .odd-val{color:var(--accent2)}
  .odd-chip.best-market .odd-val{color:var(--accent)}
  .value-tag{font-size:0.56rem;font-weight:700;margin-top:2px}
  .match-tip{margin-top:8px;font-size:0.7rem;color:var(--muted);border-top:1px solid var(--border);padding-top:7px;line-height:1.45}
  .rec-badge{font-size:0.58rem;padding:2px 6px;border-radius:4px;background:rgba(0,229,160,0.15);color:var(--green);font-weight:700}

  /* LOADING / EMPTY */
  .loading-spinner{display:flex;align-items:center;justify-content:center;padding:50px 20px;flex-direction:column;gap:10px;color:var(--muted);font-size:0.78rem}
  .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.78rem}
  .empty-icon{font-size:2.4rem;margin-bottom:8px}

  /* TOAST */
  .toast{position:fixed;bottom:calc(72px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(8px);background:var(--surface2);border:1px solid var(--accent);border-radius:20px;padding:9px 18px;font-size:0.76rem;z-index:999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>

</head>
<body>

<!-- HEADER -->

<div class="header">
  <div class="logo">
    <img src="IMG_8958.png" alt="OF" onerror="this.style.display='none'">
    Otávio <span class="logo-accent">·</span> BET
  </div>
  <div id="cloud-status" class="cloud-badge off">
    <span class="sync-dot local" id="sync-dot"></span>
    <span id="sync-label">Local</span>
  </div>
</div>

<!-- PAGE: REGISTRO -->

<div class="page active" id="page-registro">
  <div class="stats-grid">
    <div class="stat-card yellow">
      <div class="stat-label">Total Apostado</div>
      <div class="stat-value" id="stat-total">R$ 0</div>
      <div class="stat-sub" id="stat-count">0 apostas</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Lucro / Perda</div>
      <div class="stat-value" id="stat-pnl">R$ 0</div>
      <div class="stat-sub" id="stat-roi">ROI: 0%</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Taxa de Acerto</div>
      <div class="stat-value" id="stat-winrate">0%</div>
      <div class="stat-sub" id="stat-wl">0W / 0L</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">Odd Média</div>
      <div class="stat-value" id="stat-avgodds">0.00</div>
      <div class="stat-sub">média ponderada</div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">➕ Nova Aposta</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Data</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Esporte</label>
        <select id="f-sport">
          <option value="⚽ Futebol">⚽ Futebol</option>
          <option value="🎾 Tênis">🎾 Tênis</option>
          <option value="🏀 Basquete">🏀 Basquete</option>
          <option value="🎰 Outro">🎰 Outro</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Evento</label>
        <input type="text" id="f-event" placeholder="Ex: Flamengo x Palmeiras">
      </div>
      <div class="form-group full">
        <label>Mercado</label>
        <select id="f-market">
          <option value="">Selecionar...</option>
          <optgroup label="⚽ Futebol">
            <option>Resultado Final (1X2)</option>
            <option>Ambos Marcam</option>
            <option>Over/Under 2.5</option>
            <option>Over/Under 1.5</option>
            <option>Handicap Asiático</option>
            <option>Placar Exato</option>
            <option>Primeiro Gol</option>
            <option>Dupla Chance</option>
            <option>BTTS + Over 2.5</option>
            <option>Gols por tempo</option>
          </optgroup>
          <optgroup label="🎾 Tênis">
            <option>Vencedor do Jogo</option>
            <option>Handicap Sets</option>
            <option>Over/Under Games</option>
            <option>Set Correto</option>
            <option>Total de Sets</option>
            <option>Vencedor 1º Set</option>
          </optgroup>
          <optgroup label="🏀 Basquete">
            <option>Resultado (ML)</option>
            <option>Over/Under Pontos</option>
            <option>Handicap</option>
          </optgroup>
          <option>Outro</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Seleção</label>
        <input type="text" id="f-selection" placeholder="Ex: Flamengo vence">
      </div>
      <div class="form-group">
        <label>Odd</label>
        <input type="number" id="f-odds" step="0.01" min="1" placeholder="1.85">
      </div>
      <div class="form-group">
        <label>Valor (R$)</label>
        <input type="number" id="f-stake" step="0.01" min="0" placeholder="50.00">
      </div>
      <div class="form-group">
        <label>Resultado</label>
        <select id="f-result">
          <option value="pending">⏳ Pendente</option>
          <option value="win">✅ Ganhou</option>
          <option value="loss">❌ Perdeu</option>
          <option value="void">⬜ Void</option>
          <option value="cashout">💸 Cashout</option>
        </select>
      </div>
      <div class="form-group">
        <label>L/P Real (R$)</label>
        <input type="number" id="f-pnl" step="0.01" placeholder="Auto">
      </div>
    </div>
    <button class="btn btn-primary" onclick="addBet()">Registrar Aposta</button>
  </div>

  <div class="filters-row">
    <button class="filter-pill active" onclick="setFilter('all',this)">Todas</button>
    <button class="filter-pill" onclick="setFilter('pending',this)">⏳ Pendentes</button>
    <button class="filter-pill" onclick="setFilter('win',this)">✅ Ganhou</button>
    <button class="filter-pill" onclick="setFilter('loss',this)">❌ Perdeu</button>
    <button class="filter-pill" onclick="setFilter('⚽ Futebol',this)">⚽ Futebol</button>
    <button class="filter-pill" onclick="setFilter('🎾 Tênis',this)">🎾 Tênis</button>
  </div>

  <div class="bets-list" id="bets-list">
    <div class="empty-state"><div class="empty-icon">📭</div>Nenhuma aposta ainda.</div>
  </div>
</div>

<!-- PAGE: INSIGHTS -->

<div class="page" id="page-insights">
  <div id="insights-content">
    <div class="empty-state"><div class="empty-icon">📊</div>Registre apostas para ver insights.</div>
  </div>
</div>

<!-- PAGE: OPORTUNIDADES -->

<div class="page" id="page-oportunidades">
  <div class="opp-header">
    <div>
      <div class="opp-title">🎯 Oportunidades</div>
      <div class="last-update">
        <div class="dot-live"></div>
        <span id="last-update-txt">Carregando...</span>
      </div>
    </div>
    <button class="btn btn-outline btn-sm" onclick="loadOpportunities()">🔄 Atualizar</button>
  </div>

  <div class="day-filters" id="day-filters"></div>

  <div class="sport-tabs">
    <button class="sport-tab active" id="tab-football" onclick="switchSport('football')">⚽ Futebol</button>
    <button class="sport-tab" id="tab-tennis" onclick="switchSport('tennis')">🎾 Tênis</button>
  </div>

  <div id="ai-insight-banner"></div>
  <div id="opp-content">
    <div class="loading-spinner"><div class="spinner"></div><span>Analisando seu histórico...</span></div>
  </div>
</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">
  <button class="bnav-tab active" onclick="showPage('registro',this)">
    <span class="icon">📋</span>Apostas
  </button>
  <button class="bnav-tab" onclick="showPage('insights',this)">
    <span class="icon">📊</span>Insights
  </button>
  <button class="bnav-tab" onclick="showPage('oportunidades',this)">
    <span class="icon">🎯</span>Dicas IA
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const STORAGE_KEY = 'otavio_bets_v3';
let bets = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentSport = 'football';
let currentDayFilter = 0;
let currentFilter = 'all';
let opportunities = { football: [], tennis: [] };
let cloudReady = false;

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  document.getElementById('f-date').value = today.toISOString().split('T')[0];

  document.getElementById('f-result').addEventListener('change', calcPnl);
  document.getElementById('f-odds').addEventListener('input', calcPnl);
  document.getElementById('f-stake').addEventListener('input', calcPnl);

  buildDayFilters();
  renderStats();
  renderBets();
  setTimeout(initCloud, 600);
  setTimeout(loadOpportunities, 1000);
});

// ══════════════════════════════════════════════
// FIREBASE CLOUD SYNC
// ══════════════════════════════════════════════
async function initCloud() {
  const fb = window._fb;
  if (!fb || !fb.cloudEnabled || !fb.db) {
    updateCloudBadge('off');
    return;
  }
  try {
    cloudReady = true;
    updateCloudBadge('syncing');
    const ref = fb.doc(fb.db, 'users', 'otavio');

    // Realtime listener — sincroniza automaticamente
    fb.onSnapshot(ref, (snap) => {
      if (snap.exists()) {
        const cloudBets = snap.data().bets || [];
        if (JSON.stringify(cloudBets) !== JSON.stringify(bets)) {
          bets = cloudBets;
          localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));
          renderStats();
          renderBets();
        }
      }
      updateCloudBadge('on');
    });

    // Push dados locais se nuvem estiver vazia
    const snap = await fb.getDoc(ref);
    if (!snap.exists() && bets.length > 0) {
      await fb.setDoc(ref, { bets, updatedAt: new Date().toISOString() });
    }
  } catch(e) {
    console.warn('Cloud error:', e);
    updateCloudBadge('off');
  }
}

async function saveToCloud() {
  const fb = window._fb;
  if (!fb || !fb.cloudEnabled || !cloudReady || !fb.db) return;
  try {
    updateCloudBadge('syncing');
    await fb.setDoc(fb.doc(fb.db, 'users', 'otavio'), {
      bets,
      updatedAt: new Date().toISOString()
    });
    updateCloudBadge('on');
  } catch(e) {
    updateCloudBadge('off');
  }
}

function updateCloudBadge(state) {
  const badge = document.getElementById('cloud-status');
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  if (state === 'on') {
    badge.className = 'cloud-badge on';
    dot.className = 'sync-dot synced';
    label.textContent = '☁️ Nuvem';
  } else if (state === 'syncing') {
    badge.className = 'cloud-badge on';
    dot.className = 'sync-dot syncing';
    label.textContent = 'Salvando...';
  } else {
    badge.className = 'cloud-badge off';
    dot.className = 'sync-dot local';
    label.textContent = '📱 Local';
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(bets));
  saveToCloud();
}

// ══════════════════════════════════════════════
// APOSTAS CRUD
// ══════════════════════════════════════════════
function calcPnl() {
  const result = document.getElementById('f-result').value;
  const odds = parseFloat(document.getElementById('f-odds').value) || 0;
  const stake = parseFloat(document.getElementById('f-stake').value) || 0;
  let pnl = '';
  if (result === 'win') pnl = ((odds - 1) * stake).toFixed(2);
  else if (result === 'loss') pnl = (-stake).toFixed(2);
  else if (result === 'void') pnl = '0';
  document.getElementById('f-pnl').value = pnl;
}

function addBet() {
  const date = document.getElementById('f-date').value;
  const ev = document.getElementById('f-event').value.trim();
  const market = document.getElementById('f-market').value;
  const selection = document.getElementById('f-selection').value.trim();
  const odds = parseFloat(document.getElementById('f-odds').value);
  const stake = parseFloat(document.getElementById('f-stake').value);
  const result = document.getElementById('f-result').value;
  const pnl = parseFloat(document.getElementById('f-pnl').value) || 0;
  const sport = document.getElementById('f-sport').value;

  if (!ev || !odds || !stake) { showToast('⚠️ Preencha Evento, Odd e Valor'); return; }

  bets.unshift({ id: Date.now(), date, event: ev, market, selection, odds, stake, result, pnl, sport });
  save();
  renderStats();
  renderBets();
  showToast('✅ Aposta registrada!');

  ['f-event','f-selection','f-odds','f-stake','f-pnl'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-result').value = 'pending';
  document.getElementById('f-market').value = '';
}

function deleteBet(id) {
  if (!confirm('Remover esta aposta?')) return;
  bets = bets.filter(b => b.id !== id);
  save();
  renderStats();
  renderBets();
  showToast('🗑️ Aposta removida');
}

function updateResult(id, result) {
  const b = bets.find(b => b.id === id);
  if (!b) return;
  b.result = result;
  if (result === 'win') b.pnl = +((b.odds - 1) * b.stake).toFixed(2);
  else if (result === 'loss') b.pnl = -b.stake;
  else if (result === 'void') b.pnl = 0;
  save();
  renderStats();
  renderBets();
  showToast('📝 Resultado atualizado');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(el => el.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderBets();
}

// ══════════════════════════════════════════════
// RENDER STATS
// ══════════════════════════════════════════════
function renderStats() {
  const resolved = bets.filter(b => b.result !== 'pending' && b.result !== 'void');
  const total = bets.reduce((s, b) => s + b.stake, 0);
  const pnl = bets.reduce((s, b) => s + (b.pnl || 0), 0);
  const wins = resolved.filter(b => b.result === 'win').length;
  const losses = resolved.filter(b => b.result === 'loss').length;
  const roi = total > 0 ? (pnl / total * 100) : 0;
  const avgOdds = bets.length > 0 ? bets.reduce((s, b) => s + b.odds, 0) / bets.length : 0;

  document.getElementById('stat-total').textContent = 'R$ ' + total.toFixed(2);
  document.getElementById('stat-count').textContent = bets.length + ' apostas';

  const pnlEl = document.getElementById('stat-pnl');
  pnlEl.textContent = (pnl >= 0 ? '+' : '') + 'R$ ' + pnl.toFixed(2);
  pnlEl.className = 'stat-value ' + (pnl >= 0 ? 'pos' : 'neg');

  document.getElementById('stat-roi').textContent = 'ROI: ' + (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%';
  const wr = resolved.length > 0 ? (wins / resolved.length * 100) : 0;
  document.getElementById('stat-winrate').textContent = wr.toFixed(0) + '%';
  document.getElementById('stat-wl').textContent = wins + 'W / ' + losses + 'L';
  document.getElementById('stat-avgodds').textContent = avgOdds.toFixed(2);
}

// ══════════════════════════════════════════════
// RENDER BETS
// ══════════════════════════════════════════════
function renderBets() {
  const filtered = bets.filter(b => {
    if (currentFilter === 'all') return true;
    if (['win','loss','pending','void','cashout'].includes(currentFilter)) return b.result === currentFilter;
    return b.sport === currentFilter;
  });

  const wrap = document.getElementById('bets-list');
  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>Nenhuma aposta encontrada.</div>';
    return;
  }

  const labelMap = { win:'✅ Ganhou', loss:'❌ Perdeu', pending:'⏳ Pendente', void:'⬜ Void', cashout:'💸 Cashout' };
  wrap.innerHTML = filtered.map(b => {
    const pos = (b.pnl || 0) >= 0;
    return `<div class="bet-row">
      <div class="bet-row-top">
        <div class="bet-event">${b.sport} ${b.event}</div>
        <div class="bet-pnl" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}R$${(b.pnl||0).toFixed(2)}</div>
      </div>
      <div class="bet-tags">
        ${b.date ? `<span class="tag">${formatDate(b.date)}</span>` : ''}
        ${b.market ? `<span class="tag gold">${b.market}</span>` : ''}
        <span class="tag">@${(b.odds||0).toFixed(2)}</span>
        <span class="tag">R$${(b.stake||0).toFixed(2)}</span>
        ${b.selection ? `<span class="tag">${b.selection}</span>` : ''}
      </div>
      <div class="bet-row-bot">
        <select class="result-select" onchange="updateResult(${b.id}, this.value)">
          ${['pending','win','loss','void','cashout'].map(r =>
            `<option value="${r}" ${b.result===r?'selected':''}>${labelMap[r]}</option>`
          ).join('')}
        </select>
        <button class="btn btn-danger btn-sm" onclick="deleteBet(${b.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function formatDate(d) {
  if (!d) return '—';
  const [, m, day] = d.split('-');
  return `${day}/${m}`;
}

function renderInsights() {
  const c = document.getElementById('insights-content');
  if (!bets.length) {
    c.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>Registre apostas para ver insights.</div>';
    return;
  }

  const sports = {}, markets = {};
  const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const byDay = Array(7).fill(null).map(() => ({ count:0, won:0, pnl:0 }));

  bets.forEach(b => {
    if (!sports[b.sport]) sports[b.sport] = { count:0, won:0, stake:0, pnl:0 };
    sports[b.sport].count++;
    sports[b.sport].stake += b.stake;
    sports[b.sport].pnl += (b.pnl || 0);
    if (b.result === 'win') sports[b.sport].won++;

    if (b.market) {
      if (!markets[b.market]) markets[b.market] = { count:0, won:0, pnl:0, stake:0 };
      markets[b.market].count++;
      markets[b.market].stake += b.stake;
      markets[b.market].pnl += (b.pnl || 0);
      if (b.result === 'win') markets[b.market].won++;
    }

    if (b.date) {
      const d = new Date(b.date + 'T12:00:00').getDay();
      byDay[d].count++;
      byDay[d].pnl += (b.pnl || 0);
      if (b.result === 'win') byDay[d].won++;
    }
  });

  const mxS = Math.max(...Object.values(sports).map(s => Math.abs(s.pnl)), 1);
  const mxM = Math.max(...Object.values(markets).map(m => Math.abs(m.pnl)), 1);
  const mxD = Math.max(...byDay.map(d => Math.abs(d.pnl)), 1);

  const totalStake = bets.reduce((s, b) => s + b.stake, 0);
  const totalPnl = bets.reduce((s, b) => s + (b.pnl || 0), 0);
  const resolved = bets.filter(b => b.result !== 'pending' && b.result !== 'void');
  const wins = resolved.filter(b => b.result === 'win').length;
  const bestBet = [...bets].sort((a, b) => (b.pnl||0) - (a.pnl||0))[0];
  const bestMarket = Object.entries(markets).sort((a, b) => b[1].pnl - a[1].pnl)[0];
  const streak = calcStreak();

  c.innerHTML = `
    <div class="insight-card" style="border-color:rgba(245,197,24,0.18);background:linear-gradient(135deg,rgba(245,197,24,0.05),rgba(0,229,160,0.03))">
      <div class="insight-title">💡 Resumo Geral</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.78rem;">
        <div><span style="color:var(--muted)">Investido</span><br><strong>R$ ${totalStake.toFixed(2)}</strong></div>
        <div><span style="color:var(--muted)">P&L Total</span><br><strong style="color:${totalPnl>=0?'var(--green)':'var(--red)'}">${totalPnl>=0?'+':''}R$ ${totalPnl.toFixed(2)}</strong></div>
        <div><span style="color:var(--muted)">ROI</span><br><strong>${totalStake>0?(totalPnl/totalStake*100).toFixed(1):0}%</strong></div>
        <div><span style="color:var(--muted)">Acerto</span><br><strong>${resolved.length>0?(wins/resolved.length*100).toFixed(0):0}%</strong></div>
        <div><span style="color:var(--muted)">Sequência</span><br><strong style="font-size:0.75rem">${streak}</strong></div>
        ${bestMarket ? `<div><span style="color:var(--muted)">Melhor mercado</span><br><strong style="color:var(--accent2);font-size:0.75rem">${bestMarket[0]}</strong></div>` : ''}
        ${bestBet ? `<div style="grid-column:span 2"><span style="color:var(--muted)">Melhor aposta</span><br><strong style="color:var(--green);font-size:0.75rem">${bestBet.event} (+R$${(bestBet.pnl||0).toFixed(2)})</strong></div>` : ''}
      </div>
    </div>

    <div class="insight-card">
      <div class="insight-title">📈 P&L por Esporte</div>
      ${Object.entries(sports).map(([sp, s]) => {
        const roi = s.stake > 0 ? (s.pnl / s.stake * 100) : 0;
        const pos = s.pnl >= 0;
        const pct = Math.abs(s.pnl) / mxS * 100;
        return `<div class="bar-row">
          <div class="bar-label">${sp}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pos?'var(--green)':'var(--red)'}"></div></div>
          <div class="bar-val" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}R$${s.pnl.toFixed(0)}</div>
        </div>
        <div style="font-size:0.67rem;color:var(--muted);margin-bottom:9px;margin-left:95px">${s.count}x · ${s.count>0?(s.won/s.count*100).toFixed(0):0}% acerto · ROI ${roi.toFixed(0)}%</div>`;
      }).join('')}
    </div>

    <div class="insight-card">
      <div class="insight-title">🎯 Mercados por P&L</div>
      ${Object.entries(markets).sort((a, b) => b[1].pnl - a[1].pnl).slice(0, 8).map(([mkt, m]) => {
        const pos = m.pnl >= 0;
        const pct = Math.abs(m.pnl) / mxM * 100;
        const wr = m.count > 0 ? (m.won / m.count * 100).toFixed(0) : 0;

          <div class="bar-label" title="${mkt}">${mkt}</div>

      <div class="insight-title">📅 P&L por Dia da Semana</div>
      ${byDay.map((d, i) => {

        return `<div class="bar-row">
          <div class="bar-label">${days[i]} (${d.count}x)</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pos?'var(--green)':'var(--red)'}"></div></div>
          <div class="bar-val" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}R$${d.pnl.toFixed(0)}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function calcStreak() {
  const res = bets.filter(b => b.result === 'win' || b.result === 'loss').map(b => b.result);
  if (!res.length) return '—';
  const last = res[0];
  let streak = 1;
  for (let i = 1; i < res.length; i++) { if (res[i] === last) streak++; else break; }
  return `${streak}x ${last === 'win' ? '✅ vitórias' : '❌ derrotas'}`;
}

// ══════════════════════════════════════════════
// PERFIL INTELIGENTE (alimenta a IA)
// ══════════════════════════════════════════════
function buildUserProfile() {
  const resolved = bets.filter(b => b.result === 'win' || b.result === 'loss');
  if (resolved.length < 2) return null;

  const markets = {};
  resolved.forEach(b => {
    if (!b.market) return;
    if (!markets[b.market]) markets[b.market] = { count:0, won:0, pnl:0, stake:0 };
    markets[b.market].count++;
    markets[b.market].stake += b.stake;
    markets[b.market].pnl += (b.pnl || 0);
    if (b.result === 'win') markets[b.market].won++;
  });

  const marketRanking = Object.entries(markets)
    .filter(([, m]) => m.count >= 2)
    .map(([name, m]) => ({
      name,
      winRate: m.won / m.count,
      roi: m.stake > 0 ? m.pnl / m.stake : 0,
      count: m.count,
      pnl: m.pnl
    }))
    .sort((a, b) => b.roi - a.roi)
    .slice(0, 3);

  const sports = {};
  resolved.forEach(b => {
    if (!sports[b.sport]) sports[b.sport] = { count:0, won:0, pnl:0 };
    sports[b.sport].count++;
    sports[b.sport].pnl += (b.pnl || 0);
    if (b.result === 'win') sports[b.sport].won++;
  });
  const bestSport = Object.entries(sports).sort((a, b) => b[1].pnl - a[1].pnl)[0];

  const wins = resolved.filter(b => b.result === 'win');
  const avgWinOdd = wins.length > 0 ? wins.reduce((s, b) => s + b.odds, 0) / wins.length : 1.8;

  const sevenDaysAgo = new Date();
  sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
  const recent = resolved.filter(b => b.date && new Date(b.date + 'T12:00:00') >= sevenDaysAgo);
  const recentPnl = recent.reduce((s, b) => s + (b.pnl || 0), 0);
  const recentWr = recent.length > 0 ? recent.filter(b => b.result === 'win').length / recent.length : 0;

  return { marketRanking, bestSport: bestSport?.[0], avgWinOdd, recentPnl, recentWr, totalBets: resolved.length };
}

async function loadOpportunities() {
  document.getElementById('opp-content').innerHTML =
    '<div class="loading-spinner"><div class="spinner"></div><span>Buscando odds reais + análise IA...</span></div>';
  document.getElementById('ai-insight-banner').innerHTML = '';

  const profile = buildUserProfile();

  try {
    // Tenta buscar odds reais da API
    const hasRealApi = ODDS_API_KEY !== 'COLE_SUA_KEY_AQUI';

    if (hasRealApi) {
      await loadRealOdds(profile);
    } else {
      // Fallback: IA gera jogos simulados com odds realistas
      await loadAIMatches(profile);
    }
  } catch(e) {
    console.error('loadOpportunities error:', e);
    // Sempre tenta o fallback de IA
    try {
      await loadAIMatches(profile);
    } catch(e2) {
      document.getElementById('opp-content').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div>Sem conexão. Tente novamente.</div>';
    }
  }
}

// ── FONTE 1: Odds reais via The-Odds-API ──────
async function loadRealOdds(profile) {
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate() + currentDayFilter);
  const dateFrom = new Date(targetDate); dateFrom.setHours(0,0,0,0);
  const dateTo   = new Date(targetDate); dateTo.setHours(23,59,59,999);

  const sports = SPORT_KEYS[currentSport];
  let allMatches = [];

  for (const sportKey of sports) {
    try {
      const url = `https://api.the-odds-api.com/v4/sports/${sportKey}/odds/?apiKey=${ODDS_API_KEY}&regions=eu&markets=h2h,totals&oddsFormat=decimal&dateFormat=iso&commenceTimeFrom=${dateFrom.toISOString()}&commenceTimeTo=${dateTo.toISOString()}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();

      for (const game of data.slice(0, 4)) {
        const bet365 = game.bookmakers?.find(b => b.key === 'bet365') || game.bookmakers?.[0];
        if (!bet365) continue;

        const h2h = bet365.markets?.find(m => m.key === 'h2h');
        const totals = bet365.markets?.find(m => m.key === 'totals');

        const odds = [];
        if (h2h) {
          const home = h2h.outcomes.find(o => o.name === game.home_team);
          const away = h2h.outcomes.find(o => o.name === game.away_team);
          const draw = h2h.outcomes.find(o => o.name === 'Draw');
          if (home) odds.push({ type: 'Casa', value: home.price, highlight: false, isProfile: false });
          if (draw) odds.push({ type: 'Empate', value: draw.price, highlight: false, isProfile: false });
          if (away) odds.push({ type: 'Fora', value: away.price, highlight: false, isProfile: false });
        }
        if (totals) {
          const over = totals.outcomes.find(o => o.name === 'Over');
          const under = totals.outcomes.find(o => o.name === 'Under');
          if (over) odds.push({ type: `Over ${over.point||2.5}`, value: over.price, highlight: false, isProfile: false });
          if (under) odds.push({ type: `Under ${under.point||2.5}`, value: under.price, highlight: false, isProfile: false });
        }

        if (!odds.length) continue;

        // Marca highlight na melhor odd de valor
        const maxOdd = Math.max(...odds.map(o => o.value));
        odds.forEach(o => { if (o.value === maxOdd && o.value > 2.0) o.highlight = true; });

        // Marca isProfile conforme histórico
        tagProfileOdds(odds, profile);

        const leagueInfo = LEAGUE_LABELS[sportKey] || { name: sportKey, flag: '🏆' };
        const commenceTime = new Date(game.commence_time);
        const timeStr = commenceTime.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

        allMatches.push({
          id: game.id,
          league: leagueInfo.name,
          leagueFlag: leagueInfo.flag,
          home: game.home_team,
          away: game.away_team,
          time: timeStr,
          recommended: false,
          odds,
          tip: '',
          confidence: 3,
          newsQuery: `${game.home_team} ${game.away_team}`
        });
      }
    } catch(e) { continue; }
  }

  if (!allMatches.length) {
    // Nenhum jogo no dia selecionado, usa IA
    await loadAIMatches(profile);
    return;
  }

  // Marca recommended baseado no perfil
  tagRecommended(allMatches, profile);

  // Busca análise IA para os jogos reais
  const insight = await getAIInsight(allMatches, profile, currentSport === 'football' ? 'futebol' : 'tênis');

  opportunities[currentSport] = allMatches;
  document.getElementById('last-update-txt').textContent =
    '🔴 Odds reais Bet365 · ' + new Date().toLocaleTimeString('pt-BR');

  if (insight) renderAiBanner(insight, profile);
  renderOpportunities();
}

async function loadAIMatches(profile) {

  const profilePart = profile ? buildProfileText(profile) : '';

  const prompt = `Você é especialista em apostas esportivas para o mercado brasileiro.

Ligas: ${sport==='futebol'
  ? 'Brasileirão A, Brasileirão B, Premier League, La Liga, Bundesliga, Serie A, Libertadores, Champions League'
  : 'ATP/WTA: Roland Garros, Wimbledon, US Open, Masters 1000'}.
Odds realistas como Bet365.${profilePart}

Responda SOMENTE JSON válido sem markdown:
{"insight":"dica personalizada curta (vazia se sem perfil)","matches":[{"id":"1","league":"liga","leagueFlag":"emoji","home":"time/jogador","away":"time/jogador","time":"HH:MM","recommended":false,"tip":"análise curta do jogo com contexto real","confidence":3,"odds":[{"type":"Casa","value":1.85,"highlight":false,"isProfile":false},{"type":"Empate","value":3.40,"highlight":false,"isProfile":false},{"type":"Fora","value":4.20,"highlight":false,"isProfile":false},{"type":"Over 2.5","value":1.72,"highlight":true,"isProfile":false},{"type":"BTTS","value":1.65,"highlight":false,"isProfile":false}]}]}

8 jogos variados. Tênis: sem Empate, adicione Over Games e Vencedor 1º Set. highlight=true na odd de maior valor esperado. isProfile=true nas odds alinhadas com histórico do apostador. confidence 1-5. tip deve mencionar forma recente, lesões, ou contexto real do jogo.`;

  const PROXIES = [
    'https://corsproxy.io/?url=',
    'https://api.allorigins.win/raw?url=',
    'https://cors-anywhere.herokuapp.com/'
  ];

  const target = encodeURIComponent('https://api.anthropic.com/v1/messages');
  let data = null;

  for (const proxy of PROXIES) {
    try {
      const url = proxy.includes('?url=') ? proxy + target : proxy + 'https://api.anthropic.com/v1/messages';
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': '', 'anthropic-version': '2023-06-01' },

        })
      });
      if (res.ok) { data = await res.json(); break; }
    } catch(e) { continue; }
  }

  // Se todos os proxies falharem, usa dados locais enriquecidos
  if (!data) {

  }

  const text = (data.content || []).map(i => i.text || '').join('');

  const parsed = JSON.parse(clean);

  const matches = (parsed.matches || []).map(m => ({
    ...m,

  }));

  tagRecommended(matches, profile);
  opportunities[currentSport] = matches;

  document.getElementById('last-update-txt').textContent =
    '🤖 IA · ' + new Date().toLocaleTimeString('pt-BR');

  if (parsed.insight) renderAiBanner(parsed.insight, profile);

// ── IA analisa jogos reais e gera tips/insight ──
async function getAIInsight(matches, profile, sport) {
  if (!matches.length) return null;
  const matchList = matches.slice(0, 6).map(m => `${m.home} x ${m.away} (${m.league})`).join(', ');
  const profilePart = profile ? buildProfileText(profile) : '';

  const prompt = `Você é analista de apostas. Analise estes jogos: ${matchList}.${profilePart}
Responda SOMENTE JSON: {"insight":"frase curta personalizada para o apostador","tips":{"${matches[0]?.home} x ${matches[0]?.away}":"análise curta"}}`;

  try {
    const PROXIES = ['https://corsproxy.io/?url=', 'https://api.allorigins.win/raw?url='];
    for (const proxy of PROXIES) {
      try {
        const url = proxy + encodeURIComponent('https://api.anthropic.com/v1/messages');
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': '', 'anthropic-version': '2023-06-01' },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 500,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        if (!res.ok) continue;
        const data = await res.json();
        const text = (data.content || []).map(i => i.text || '').join('');
        const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
        // Adiciona tips nos jogos
        matches.forEach(m => {
          const key = `${m.home} x ${m.away}`;
          if (parsed.tips?.[key]) m.tip = parsed.tips[key];
        });
        return parsed.insight || null;
      } catch(e) { continue; }
    }
  } catch(e) {}
  return null;
}

// ── Helpers de perfil ─────────────────────────
function buildProfileText(profile) {
  return `

PERFIL DO APOSTADOR (histórico real):
- Apostas resolvidas: ${profile.totalBets}
- Esporte mais lucrativo: ${profile.bestSport || 'indefinido'}
- Odd média das vitórias: ${profile.avgWinOdd.toFixed(2)}
- P&L últimos 7 dias: R$ ${profile.recentPnl.toFixed(2)}
- Taxa de acerto recente: ${(profile.recentWr * 100).toFixed(0)}%
- Melhores mercados (ROI): ${profile.marketRanking.map(m => `${m.name} (${(m.winRate*100).toFixed(0)}% acerto, ROI ${(m.roi*100).toFixed(0)}%)`).join('; ') || 'insuficiente'}

Priorize jogos alinhados com os melhores mercados do apostador. recommended=true nos 2-3 mais compatíveis. isProfile=true nas odds dos mercados com melhor histórico.`;
}

function tagProfileOdds(odds, profile) {
  if (!profile?.marketRanking?.length) return;
  const bestMarkets = profile.marketRanking.map(m => m.name.toLowerCase());
  odds.forEach(o => {
    if (bestMarkets.some(m => o.type.toLowerCase().includes(m.toLowerCase().split(' ')[0]))) {
      o.isProfile = true;
    }
  });
}

function tagProfileOdds_all(matches, profile) {
  matches.forEach(m => tagProfileOdds(m.odds, profile));
}

function tagRecommended(matches, profile) {
  if (!profile?.marketRanking?.length) return;
  const bestMarkets = profile.marketRanking.map(m => m.name.toLowerCase());
  matches.forEach(m => {
    const hasMatch = m.odds.some(o =>
      bestMarkets.some(bm => o.type.toLowerCase().includes(bm.split(' ')[0]))
    );
    if (hasMatch) m.recommended = true;
    tagProfileOdds(m.odds, profile);
  });
  // Limita recomendados a 3
  let count = 0;
  matches.forEach(m => { if (m.recommended) { count++; if (count > 3) m.recommended = false; } });
}

function renderAiBanner(insight, profile) {
  const wrap = document.getElementById('ai-insight-banner');
  const bestMkt = profile?.marketRanking?.[0];

  if (!insight && !bestMkt) { wrap.innerHTML = ''; return; }

  wrap.innerHTML = `<div class="ai-banner">
    <div class="ai-banner-title">🤖 IA · Análise Personalizada</div>
    <div class="ai-banner-text">
      ${insight ? insight + '<br><br>' : ''}
      ${bestMkt ? `Seu mercado mais rentável: <strong>${bestMkt.name}</strong> — ${(bestMkt.winRate*100).toFixed(0)}% de acerto, ROI <strong>${(bestMkt.roi*100).toFixed(0)}%</strong>. As odds marcadas com <strong style="color:var(--accent)">✓ perfil</strong> são deste mercado.` : ''}
    </div>
  </div>`;
}

function renderOpportunities() {
  const matches = currentSport === 'football' ? opportunities.football : opportunities.tennis;
  const wrap = document.getElementById('opp-content');

  if (!matches || !matches.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>Nenhum jogo encontrado para esta data.</div>';
    return;
  }

  wrap.innerHTML = matches.map(m => `
    <div class="match-card ${m.recommended ? 'recommended' : ''}">
      <div class="match-top">
        <div class="match-league">
          ${m.leagueFlag || '🏆'} ${m.league}
          ${m.recommended ? '<span class="rec-badge">★ Para você</span>' : ''}
        </div>
        <div style="display:flex;align-items:center;gap:7px">
          <span style="font-size:0.72rem">${'⭐'.repeat(Math.min(m.confidence||3,5))}</span>
          <div class="match-time">🕐 ${m.time}</div>
        </div>
      </div>
      <div class="match-teams">${escHtml(m.home)} <span class="vs">VS</span> ${escHtml(m.away)}</div>
      <div class="odds-row">
        ${(m.odds || []).map(o => `
          <div class="odd-chip ${o.highlight?'highlight':''} ${o.isProfile&&!o.highlight?'best-market':''}"
               onclick="quickBet('${escQ(m.home)} x ${escQ(m.away)}','${escQ(o.type)}',${+o.value})">
            <div class="odd-type">${o.type}</div>
            <div class="odd-val">${(+o.value).toFixed(2)}</div>
            ${o.highlight ? '<div class="value-tag" style="color:var(--accent2)">★ valor</div>' : ''}
            ${o.isProfile && !o.highlight ? '<div class="value-tag" style="color:var(--accent)">✓ perfil</div>' : ''}
          </div>
        `).join('')}
      </div>
      ${m.tip ? `<div class="match-tip">💡 ${m.tip}</div>` : ''}
    </div>
  `).join('');
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escQ(s) { return String(s).replace(/'/g,'`').replace(/"/g,'`'); }

function quickBet(ev, market, odds) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.bnav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-registro').classList.add('active');
  document.querySelector('.bnav-tab').classList.add('active');
  setTimeout(() => {
    document.getElementById('f-event').value = ev;
    document.getElementById('f-odds').value = odds;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    showToast(`📋 ${ev} @ ${odds}`);
  }, 100);
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto refresh oportunidades a cada 4h
setInterval(() => {
  if (document.getElementById('page-oportunidades').classList.contains('active')) loadOpportunities();
